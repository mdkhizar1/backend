services:
  - type: web
    name: netbanking-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: netbanking-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"

databases:
  - name: netbanking-db
    databaseName: netbanking
    user: netbanking_user
    plan: free
